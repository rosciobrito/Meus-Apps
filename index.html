<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Inventário UFMA</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f4f4f9; }
        h1 { font-size: 1.5em; text-align: center; color: #333; }
        .config-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ffc107; }
        input[type="password"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        video, canvas { width: 100%; border-radius: 8px; background: #000; margin-bottom: 10px; display: none; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .btn { flex: 1; min-width: 140px; padding: 15px; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; color: white; text-align: center; }
        .btn-camera { background-color: #0056b3; }
        .btn-upload { background-color: #6c757d; }
        .btn-capture { background-color: #28a745; display: none; width: 100%; margin-bottom: 10px; }
        .btn-save { background-color: #17a2b8; display: none; width: 100%; margin-top: 15px; }
        .paste-area { border: 2px dashed #0056b3; border-radius: 8px; padding: 15px; text-align: center; background-color: #e9f2fb; margin-bottom: 20px; font-size: 0.9em; }
        #result { background: #fff; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { border-collapse: collapse; width: 100%; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        #loading { text-align: center; font-weight: bold; color: #ff9800; display: none; margin: 15px 0; }
        #statusMsg { text-align: center; font-weight: bold; margin: 15px 0; display: none; padding: 15px; border-radius: 8px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <h1>Scanner de Inventário</h1>

    <div class="config-box" id="configKeyArea">
        <label><b>Chave da API Gemini:</b></label>
        <input type="password" id="api_key_input" placeholder="Cole sua nova chave aqui..." onchange="saveKey()">
        <small style="color: #666;">A chave fica salva apenas neste celular/PC.</small>
    </div>

    <div class="paste-area">📸 <b>Ctrl+V</b> para colar imagem</div>

    <div class="action-buttons">
        <button id="btnStart" class="btn btn-camera" onclick="startCamera()">Abrir Câmera</button>
        <label for="fileInput" class="btn btn-upload">Enviar Arquivo</label>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display: none;"></canvas>
    <button id="btnCapture" class="btn btn-capture" onclick="takePhoto()">Capturar Etiqueta</button>

    <div id="loading">🤖 Analisando...</div>
    <div id="statusMsg"></div>
    <div id="result"></div>
    <button id="btnSave" class="btn btn-save" onclick="sendToSheet()">Salvar no Google Sheets</button>

    <script>
        // CONFIGURAÇÕES
        const SCRIPT_URL = "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI"; // MANTENHA A SUA URL AQUI
        
        // Recupera a chave salva no navegador ao abrir
        document.getElementById('api_key_input').value = localStorage.getItem('gemini_key') || '';

        function saveKey() {
            const key = document.getElementById('api_key_input').value;
            localStorage.setItem('gemini_key', key);
            alert("Chave salva localmente!");
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btnStart = document.getElementById('btnStart');
        const btnCapture = document.getElementById('btnCapture');
        const btnSave = document.getElementById('btnSave');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const statusMsg = document.getElementById('statusMsg');
        let stream;
        let currentExtractedData = {};

        const geminiPrompt = `Analise a etiqueta da foto e extraia em Tabela Markdown: Tipo, Marca, Modelo, IMEI, Nº Série, Acessórios. Se não ver, use N/A.`;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.style.display = 'block'; video.srcObject = stream;
                btnStart.style.display = 'none'; btnCapture.style.display = 'block';
                resetUI();
            } catch (err) { alert("Erro na câmera: " + err.message); }
        }

        function takePhoto() {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
            stopCamera(); processImageBase64(base64Image);
        }

        function stopCamera() { if (stream) { stream.getTracks().forEach(t => t.stop()); video.style.display = 'none'; btnCapture.style.display = 'none'; btnStart.style.display = 'block'; } }

        function handleFileUpload(e) { const file = e.target.files[0]; if (file) { stopCamera(); readFileAsBase64(file); } }

        document.addEventListener('paste', e => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i in items) { if (items[i].kind === 'file') { stopCamera(); readFileAsBase64(items[i].getAsFile()); break; } }
        });

        function readFileAsBase64(file) {
            const reader = new FileReader();
            reader.onload = e => processImageBase64(e.target.result.split(',')[1]);
            reader.readAsDataURL(file);
        }

        function resetUI() { statusMsg.style.display = 'none'; resultDiv.style.display = 'none'; btnSave.style.display = 'none'; loadingDiv.style.display = 'none'; }

        async function processImageBase64(base64) {
            const apiKey = localStorage.getItem('gemini_key');
            if (!apiKey) { alert("Por favor, insira a chave da API no topo da página."); return; }
            resetUI(); loadingDiv.style.display = 'block';

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: geminiPrompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                const txt = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = marked.parse(txt);
                extractData();
                loadingDiv.style.display = 'none'; resultDiv.style.display = 'block'; btnSave.style.display = 'block';
            } catch (err) { alert("Erro: " + err.message); loadingDiv.style.display = 'none'; }
        }

        function extractData() {
            const rows = resultDiv.querySelectorAll('tr');
            currentExtractedData = { tipo: "", marca: "", modelo: "", imei: "", sn: "", acessorios: "" };
            rows.forEach(r => {
                const c = r.querySelectorAll('td');
                if (c.length === 2) {
                    const k = c[0].textContent.toLowerCase(); const v = c[1].textContent.trim();
                    if (k.includes('tipo')) currentExtractedData.tipo = v;
                    else if (k.includes('marca')) currentExtractedData.marca = v;
                    else if (k.includes('modelo')) currentExtractedData.modelo = v;
                    else if (k.includes('imei')) currentExtractedData.imei = v;
                    else if (k.includes('série') || k.includes('sn')) currentExtractedData.sn = v;
                    else if (k.includes('acessórios')) currentExtractedData.acessorios = v;
                }
            });
        }

        async function sendToSheet() {
            btnSave.disabled = true; btnSave.textContent = "Enviando...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(currentExtractedData), mode: 'no-cors' });
                statusMsg.innerHTML = "✅ Salvo na Planilha!"; statusMsg.style.backgroundColor = "#d4edda"; statusMsg.style.display = "block";
                resultDiv.style.display = "none"; btnSave.style.display = "none";
            } catch (err) { alert("Erro ao enviar."); }
            finally { btnSave.disabled = false; btnSave.textContent = "Salvar no Google Sheets"; }
        }
    </script>
</body>
</html>

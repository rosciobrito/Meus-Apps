<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portal de Apps</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
        }

        /* Grid de Mini Apps */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Estilo do Card */
        .app-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .app-card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .app-card i {
            font-size: 40px;
            color: var(--accent-color);
        }

        .app-card span {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .app-card small {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .app-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Meus Aplicativos</h1>
            <p>Selecione uma ferramenta abaixo para iniciar</p>
        </header>

        <div class="app-grid">
            
            <a href="Cadastro_de_aparelhos.html" class="app-card">
                <i class="ph ph-scan"></i>
                <span>OCR Inventário</span>
                <small>Captura de etiquetas</small>
            </a>

            <a href="OCR.html" class="app-card">
                <i class="ph ph-gear-six"></i>
                <span>OCR</span>
                <small>Reconhecimento ótico</small>
            </a>

            <a href="ExtraiFatura.html" class="app-card">
                <i class="ph ph-notebook"></i>
                <span>ExtraiFatura</span>
                <small>Notas rápidas</small>
            </a>
			
			<a href="ExtraiFatura.html" class="app-card">
                <i class="ph ph-notebook"></i>
                <span>ExtraiFatura</span>
                <small>Notas rápidas</small>
            </a>

            </div>
    </div>

</body>
</html>
